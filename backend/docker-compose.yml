services:
  sheets-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: innovayse_sheets
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - sheets_db_data:/var/lib/postgresql/data

volumes:
  sheets_db_data:
